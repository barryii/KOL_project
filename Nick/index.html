<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOL 流量戰略分析儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="gradient-bg text-white py-10 shadow-lg mb-10">
        <div class="container mx-auto text-center">
            <h1 class="text-4xl font-black mb-2 tracking-wider">📊 KOL 流量戰略顧問系統</h1>
            <p class="text-blue-100 opacity-80">基於隨機森林演算法的觀看數預測與關鍵字分析</p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 card-hover">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                        <i class="fas fa-magic text-indigo-50 mr-3 p-3 bg-indigo-600 rounded-lg"></i>
                        標題點擊模擬器
                    </h2>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">預計影片標題</label>
                            <input id="title" type="text" placeholder="例如：挑戰全台灣最大碗的巨無霸拉麵！"
                                class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-indigo-500 focus:outline-none transition-all text-lg">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">執行 KOL</label>
                                <select id="kol"
                                    class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-indigo-500 focus:outline-none bg-white">
                                    <option value="HowHowEat">豪豪 (HowHowEat)</option>
                                    <option value="Chienseating">千千 (Chienseating)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">影片策略標籤</label>
                                <select id="tag"
                                    class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-indigo-500 focus:outline-none bg-white">
                                    <option value="Long">長影片（>8分鐘）</option>
                                    <option value="Mid">中等長度</option>
                                    <option value="Shorts">Shorts 短影音</option>
                                </select>
                            </div>
                        </div>

                        <button onclick="predict()" id="predictBtn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl text-xl shadow-lg transform transition active:scale-95">
                            開始 AI 流量預測
                        </button>
                    </div>

                    <div id="result-box"
                        class="mt-8 p-6 bg-indigo-50 rounded-2xl border-2 border-indigo-100 hidden animate-pulse">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-indigo-600 font-bold text-sm uppercase tracking-widest">AI 預估觀看數</p>
                                <p id="view-count" class="text-5xl font-black text-indigo-900 mt-1">0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-gray-500 text-xs">命中關鍵字</p>
                                <div id="matched-tags" class="flex flex-wrap justify-end gap-1 mt-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 card-hover sticky top-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                        <i class="fas fa-fire text-orange-50 mr-3 p-3 bg-orange-500 rounded-lg"></i>
                        流量紅利排行
                    </h2>
                    <p class="text-xs text-gray-400 mb-4">* 數值代表該詞彙對觀看數的影響權重</p>

                    <div id="ranking-list" class="space-y-3">
                        <div class="animate-pulse flex space-x-4">
                            <div class="flex-1 space-y-4 py-1">
                                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                <div class="h-4 bg-gray-200 rounded"></div>
                                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                            </div>
                        </div>
                    </div>

                    <div id="connection-error"
                        class="hidden mt-4 p-3 bg-red-50 text-red-500 text-sm rounded-lg flex items-center">
                        <i class="fas fa-exclamation-circle mr-2"></i> 無法連線至 API，請確認 app.py 是否已啟動
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 本地環境 API 網址
        const API_BASE = "http://127.0.0.1:8000";

        // 頁面載入後自動取得排行榜
        window.onload = loadRanking;

        async function loadRanking() {
            try {
                const response = await axios.get(`${API_BASE}/api/features/ranking`);
                const list = document.getElementById('ranking-list');
                const data = response.data.top_features;

                list.innerHTML = data.map((item, index) => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg group hover:bg-orange-50 transition-colors">
                        <div class="flex items-center">
                            <span class="w-6 text-gray-400 font-bold text-sm">${index + 1}</span>
                            <span class="font-bold text-gray-700"># ${item.keyword}</span>
                        </div>
                        <span class="text-orange-600 font-black">${(item.score * 100).toFixed(1)}%</span>
                    </div>
                `).join('');
                document.getElementById('connection-error').classList.add('hidden');
            } catch (error) {
                console.error("排行榜載入失敗:", error);
                document.getElementById('ranking-list').innerHTML = "";
                document.getElementById('connection-error').classList.remove('hidden');
            }
        }

        async function predict() {
            const btn = document.getElementById('predictBtn');
            const title = document.getElementById('title').value;
            const kol = document.getElementById('kol').value;
            const tag = document.getElementById('tag').value;

            if (!title) {
                alert("請輸入標題再進行預測");
                return;
            }

            btn.disabled = true;
            btn.innerText = "計算中...";

            try {
                const response = await axios.post(`${API_BASE}/predict`, {
                    title: title,
                    kol_name: kol,
                    strategic_tag: tag
                });

                const resBox = document.getElementById('result-box');
                const viewEl = document.getElementById('view-count');
                const tagBox = document.getElementById('matched-tags');

                resBox.classList.remove('hidden', 'animate-pulse');
                viewEl.innerText = response.data.prediction.toLocaleString();

                tagBox.innerHTML = response.data.matched.map(t =>
                    `<span class="bg-indigo-200 text-indigo-700 px-2 py-1 rounded text-[10px] font-bold">#${t}</span>`
                ).join('');

            } catch (error) {
                console.error("預測失敗:", error);
                alert("預測失敗，請檢查 API 是否運作正常。");
            } finally {
                btn.disabled = false;
                btn.innerText = "開始 AI 流量預測";
            }
        }
    </script>
</body>

</html>
