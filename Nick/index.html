<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOL 流量戰略分析儀表板</title>
    <meta name="description" content="基於 AI 的 KOL 成長分析、標題情緒分析、受眾偏好對比與發片率成長比較系統">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg: #0b0d17; --bg2: #111327; --bg-card: rgba(17,19,40,0.85);
            --border: rgba(255,255,255,0.06); --border-a: rgba(102,126,234,0.3);
            --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
            --grad: linear-gradient(135deg,#667eea,#764ba2);
            --kol1: #f59e0b; --kol1r: 245,158,11;
            --kol2: #06b6d4; --kol2r: 6,182,212;
            --accent: #667eea; --success: #10b981; --danger: #ef4444;
            --r: 16px; --rs: 10px;
            --tr: all .3s cubic-bezier(.4,0,.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::before { content:''; position:fixed; top:-50%; right:-30%; width:80%; height:100%; background:radial-gradient(ellipse,rgba(102,126,234,.06),transparent 70%); pointer-events:none; }

        /* Header */
        .header { background:var(--grad); padding:2rem 2rem 1.2rem; position:relative; overflow:hidden; }
        .header::before { content:''; position:absolute; top:0; right:0; width:50%; height:100%; background:radial-gradient(ellipse at 80% 50%,rgba(255,255,255,.08),transparent 70%); }
        .header-inner { max-width:1400px; margin:0 auto; position:relative; z-index:1; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { font-size:1.6rem; font-weight:900; letter-spacing:.04em; }
        .header h1 i { margin-right:.5rem; }
        .header p { opacity:.7; font-size:.8rem; margin-top:.2rem; }
        .header-badge { background:rgba(255,255,255,.15); padding:.35rem .8rem; border-radius:100px; font-size:.7rem; font-weight:600; backdrop-filter:blur(10px); }

        /* Tabs */
        .tab-bar { background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
        .tab-bar-inner { max-width:1400px; margin:0 auto; display:flex; padding:0 2rem; overflow-x:auto; }
        .tab-btn { background:none; border:none; color:var(--text3); padding:.9rem 1.3rem; font-size:.85rem; font-weight:600; font-family:inherit; cursor:pointer; position:relative; transition:var(--tr); white-space:nowrap; display:flex; align-items:center; gap:.45rem; }
        .tab-btn:hover { color:var(--text); }
        .tab-btn.active { color:var(--accent); }
        .tab-btn.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--grad); border-radius:2px 2px 0 0; box-shadow:0 0 12px rgba(102,126,234,.5); }
        .tab-btn i { font-size:.9rem; }

        /* Main */
        .main { max-width:1400px; margin:0 auto; padding:1.5rem 2rem 3rem; }
        .tab-content { display:none; animation:fadeUp .35s ease; }
        .tab-content.active { display:block; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        /* Cards */
        .card { background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:var(--r); padding:1.4rem; transition:var(--tr); }
        .card:hover { border-color:var(--border-a); box-shadow:0 4px 30px rgba(0,0,0,.25); }
        .card-title { font-size:1rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:.6rem; }
        .card-icon { width:32px; height:32px; border-radius:var(--rs); display:flex; align-items:center; justify-content:center; font-size:.85rem; flex-shrink:0; }

        /* Grid */
        .g1 { display:grid; gap:1.2rem; }
        .g2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1.2rem; }
        .g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; }
        .g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
        .g23 { display:grid; grid-template-columns:2fr 1fr; gap:1.2rem; }
        .mb { margin-bottom:1.2rem; }

        /* Stat cards */
        .stat { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:1.1rem 1.2rem; transition:var(--tr); }
        .stat:hover { border-color:var(--border-a); }
        .stat-label { font-size:.65rem; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:.4rem; }
        .stat-val { font-size:1.6rem; font-weight:800; line-height:1.2; }
        .stat-sub { font-size:.75rem; color:var(--text2); margin-top:.2rem; }
        .stat-val.kol1 { color:var(--kol1); }
        .stat-val.kol2 { color:var(--kol2); }

        /* Chart */
        .chart-wrap { position:relative; height:300px; margin-top:.5rem; }
        .chart-wrap.tall { height:380px; }

        /* Forms */
        .form-label { display:block; font-size:.72rem; font-weight:600; color:var(--text2); margin-bottom:.4rem; text-transform:uppercase; letter-spacing:.05em; }
        .form-input,.form-select { width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text); padding:.8rem 1rem; border-radius:var(--rs); font-family:inherit; font-size:.9rem; transition:var(--tr); outline:none; }
        .form-input:focus,.form-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(102,126,234,.12); }
        .form-input::placeholder { color:var(--text3); }
        .form-select option { background:var(--bg2); color:var(--text); }
        .form-group { margin-bottom:1rem; }

        /* Buttons */
        .btn { width:100%; background:var(--grad); color:#fff; border:none; padding:.9rem; border-radius:var(--rs); font-family:inherit; font-size:.95rem; font-weight:700; cursor:pointer; transition:var(--tr); }
        .btn:hover { box-shadow:0 6px 25px rgba(102,126,234,.35); transform:translateY(-1px); }
        .btn:active { transform:scale(.98); }
        .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        /* Result */
        .result-box { background:rgba(102,126,234,.07); border:1px solid rgba(102,126,234,.18); border-radius:var(--r); padding:1.3rem; margin-top:1.2rem; display:none; }
        .result-box.show { display:block; animation:fadeUp .3s ease; }
        .result-val { font-size:2.8rem; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .result-label { font-size:.7rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
        .result-meta { display:flex; gap:.3rem; flex-wrap:wrap; margin-top:.5rem; }

        /* Tags */
        .tag { display:inline-block; background:rgba(102,126,234,.12); color:var(--accent); padding:.15rem .45rem; border-radius:4px; font-size:.65rem; font-weight:600; }
        .tag.pos { background:rgba(16,185,129,.12); color:var(--success); }
        .tag.neg { background:rgba(239,68,68,.12); color:var(--danger); }

        /* Rank list */
        .rank-item { display:flex; align-items:center; padding:.65rem .8rem; background:rgba(255,255,255,.02); border-radius:var(--rs); margin-bottom:.4rem; transition:var(--tr); gap:.6rem; }
        .rank-item:hover { background:rgba(102,126,234,.06); }
        .rank-num { width:22px; font-size:.75rem; font-weight:700; color:var(--text3); text-align:center; }
        .rank-word { flex:1; font-weight:600; font-size:.85rem; }
        .rank-score { font-weight:800; color:var(--kol1); font-size:.85rem; }

        /* Table */
        .dtable { width:100%; border-collapse:collapse; font-size:.8rem; }
        .dtable th { text-align:left; padding:.6rem .8rem; background:rgba(255,255,255,.03); color:var(--text2); font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); }
        .dtable td { padding:.6rem .8rem; border-bottom:1px solid var(--border); }
        .dtable tr:hover td { background:rgba(102,126,234,.03); }
        .dtable .truncate { max-width:240px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* KOL badges */
        .kol-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .kol-dot.k1 { background:var(--kol1); }
        .kol-dot.k2 { background:var(--kol2); }

        /* Error */
        .err-box { background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.18); border-radius:var(--rs); padding:.8rem 1rem; color:var(--danger); font-size:.8rem; display:none; align-items:center; gap:.5rem; }
        .err-box.show { display:flex; }

        /* Loading */
        .skel { background:linear-gradient(90deg,rgba(255,255,255,.02) 25%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.02) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; min-height:200px; }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

        /* Responsive */
        @media(max-width:1024px) { .g4{grid-template-columns:repeat(2,1fr)} .g3,.g23{grid-template-columns:1fr} }
        @media(max-width:768px) { .g2{grid-template-columns:1fr} .header h1{font-size:1.2rem} .main{padding:1rem} .stat-val{font-size:1.2rem} }

        /* Comparison section */
        .cmp-row { display:flex; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); }
        .cmp-label { flex:1; font-size:.8rem; color:var(--text2); }
        .cmp-vals { display:flex; gap:2rem; }
        .cmp-v { text-align:right; min-width:80px; }
        .cmp-v .v { font-weight:700; font-size:.9rem; }
        .cmp-v .l { font-size:.65rem; color:var(--text3); }

        /* Sentiment bar */
        .sent-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; margin-top:.5rem; }
        .sent-bar div { transition:width .5s ease; }
        .sent-pos { background:var(--success); }
        .sent-neu { background:var(--kol1); }
        .sent-neg { background:var(--danger); }

        /* Loading overlay */
        .loading-text { text-align:center; padding:3rem 1rem; color:var(--text3); }
        .loading-text i { font-size:1.5rem; margin-bottom:.5rem; display:block; animation:spin 1s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-inner">
            <div>
                <h1><i class="fas fa-chart-line"></i>KOL 流量戰略分析系統</h1>
                <p>AI 觀看數預測 · 情緒分析 · 受眾偏好 · 成長趨勢</p>
            </div>
            <div class="header-badge" id="model-badge">⚡ 載入中...</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <button class="tab-btn active" data-tab="predict"><i class="fas fa-magic"></i>AI 流量預測</button>
            <button class="tab-btn" data-tab="growth"><i class="fas fa-chart-bar"></i>發片成長對比</button>
            <button class="tab-btn" data-tab="sentiment"><i class="fas fa-heart"></i>標題情緒分析</button>
            <button class="tab-btn" data-tab="audience"><i class="fas fa-users"></i>受眾偏好分析</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- ==================== TAB 1: AI Predict ==================== -->
        <div id="tab-predict" class="tab-content active">
            <div class="g23">
                <div class="card">
                    <div class="card-title"><div class="card-icon" style="background:rgba(102,126,234,.15);color:var(--accent)"><i class="fas fa-wand-magic-sparkles"></i></div>標題點擊模擬器</div>
                    <div class="form-group">
                        <label class="form-label">預計影片標題</label>
                        <input id="inp-title" class="form-input" type="text" placeholder="例如：挑戰全台灣最大碗的巨無霸拉麵！">
                    </div>
                    <div class="g2 mb">
                        <div class="form-group">
                            <label class="form-label">執行 KOL</label>
                            <select id="inp-kol" class="form-select">
                                <option value="HowHowEat">豪豪 (HowHowEat)</option>
                                <option value="Chienseating">千千 (Chienseating)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">影片策略標籤</label>
                            <select id="inp-tag" class="form-select">
                                <option value="Long">長影片（>8分鐘）</option>
                                <option value="Mid">中等長度</option>
                                <option value="Shorts">Shorts 短影音</option>
                            </select>
                        </div>
                    </div>
                    <button id="btn-predict" class="btn" onclick="doPredict()"><i class="fas fa-bolt"></i>&nbsp; 開始 AI 流量預測</button>
                    <div id="result-box" class="result-box">
                        <div class="g2" style="align-items:center">
                            <div>
                                <div class="result-label">AI 預估觀看數</div>
                                <div class="result-val" id="r-views">0</div>
                                <div class="stat-sub" id="r-info"></div>
                            </div>
                            <div style="text-align:right">
                                <div class="stat-label">命中關鍵字</div>
                                <div class="result-meta" id="r-tags" style="justify-content:flex-end"></div>
                                <div style="margin-top:.6rem">
                                    <div class="stat-label">情緒分數</div>
                                    <div id="r-sentiment" style="font-weight:700;font-size:1.1rem">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="card" style="position:sticky;top:70px">
                        <div class="card-title"><div class="card-icon" style="background:rgba(245,158,11,.15);color:var(--kol1)"><i class="fas fa-fire"></i></div>流量紅利排行</div>
                        <div style="font-size:.65rem;color:var(--text3);margin-bottom:.8rem">* 數值代表關鍵字對觀看數的影響權重</div>
                        <div id="rank-list"><div class="skel"></div></div>
                        <div id="rank-err" class="err-box" style="margin-top:.8rem"><i class="fas fa-exclamation-circle"></i>無法連線 API</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== TAB 2: Growth ==================== -->
        <div id="tab-growth" class="tab-content">
            <div id="growth-loading" class="loading-text"><i class="fas fa-spinner"></i>正在載入發片數據...</div>
            <div id="growth-content" style="display:none">
                <div class="g4 mb" id="growth-stats"></div>
                <div class="g2 mb">
                    <div class="card">
                        <div class="card-title"><div class="card-icon" style="background:rgba(16,185,129,.15);color:var(--success)"><i class="fas fa-upload"></i></div>月發片量趨勢</div>
                        <div class="chart-wrap"><canvas id="chart-uploads"></canvas></div>
                    </div>
                    <div class="card">
                        <div class="card-title"><div class="card-icon" style="background:rgba(102,126,234,.15);color:var(--accent)"><i class="fas fa-eye"></i></div>月平均觀看數</div>
                        <div class="chart-wrap"><canvas id="chart-avgviews"></canvas></div>
                    </div>
                </div>
                <div class="card mb">
                    <div class="card-title"><div class="card-icon" style="background:rgba(245,158,11,.15);color:var(--kol1)"><i class="fas fa-arrow-trend-up"></i></div>月成長率對比 (MoM %)</div>
                    <div class="chart-wrap tall"><canvas id="chart-growth"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title"><div class="card-icon" style="background:rgba(118,75,162,.15);color:#a78bfa"><i class="fas fa-gauge-high"></i></div>影片類型績效對比</div>
                    <div id="tag-compare"></div>
                </div>
            </div>
        </div>

        <!-- ==================== TAB 3: Sentiment ==================== -->
        <div id="tab-sentiment" class="tab-content">
            <div id="sent-loading" class="loading-text"><i class="fas fa-spinner"></i>正在分析標題情緒...</div>
            <div id="sent-content" style="display:none">
                <div class="g4 mb" id="sent-stats"></div>
                <div class="g2 mb">
                    <div class="card">
                        <div class="card-title"><span class="kol-dot k1"></span>豪豪 情緒分佈</div>
                        <div class="chart-wrap"><canvas id="chart-sent1"></canvas></div>
                    </div>
                    <div class="card">
                        <div class="card-title"><span class="kol-dot k2"></span>千千 情緒分佈</div>
                        <div class="chart-wrap"><canvas id="chart-sent2"></canvas></div>
                    </div>
                </div>
                <div class="card mb">
                    <div class="card-title"><div class="card-icon" style="background:rgba(102,126,234,.15);color:var(--accent)"><i class="fas fa-chart-scatter"></i></div>情緒分數 vs 觀看數</div>
                    <div class="chart-wrap tall"><canvas id="chart-scatter"></canvas></div>
                </div>
                <div class="g2">
                    <div class="card">
                        <div class="card-title"><i class="fas fa-face-smile" style="color:var(--success)"></i>最正面標題 Top 5</div>
                        <table class="dtable" id="tbl-positive"></table>
                    </div>
                    <div class="card">
                        <div class="card-title"><i class="fas fa-face-frown" style="color:var(--danger)"></i>最負面標題 Top 5</div>
                        <table class="dtable" id="tbl-negative"></table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== TAB 4: Audience ==================== -->
        <div id="tab-audience" class="tab-content">
            <div id="aud-loading" class="loading-text"><i class="fas fa-spinner"></i>正在分析受眾偏好...</div>
            <div id="aud-content" style="display:none">
                <div class="g4 mb" id="aud-stats"></div>
                <div class="g2 mb">
                    <div class="card">
                        <div class="card-title"><div class="card-icon" style="background:rgba(6,182,212,.15);color:var(--kol2)"><i class="fas fa-radar"></i></div>互動率對比 (按類型)</div>
                        <div class="chart-wrap"><canvas id="chart-radar"></canvas></div>
                    </div>
                    <div class="card">
                        <div class="card-title"><div class="card-icon" style="background:rgba(245,158,11,.15);color:var(--kol1)"><i class="fas fa-chart-pie"></i></div>內容類型分佈</div>
                        <div class="chart-wrap"><canvas id="chart-typedist"></canvas></div>
                    </div>
                </div>
                <div class="g2 mb">
                    <div class="card">
                        <div class="card-title"><span class="kol-dot k1"></span>豪豪 高頻關鍵字</div>
                        <div id="kw-list-1"></div>
                    </div>
                    <div class="card">
                        <div class="card-title"><span class="kol-dot k2"></span>千千 高頻關鍵字</div>
                        <div id="kw-list-2"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title"><div class="card-icon" style="background:rgba(118,75,162,.15);color:#a78bfa"><i class="fas fa-trophy"></i></div>觀看數 Top 5 影片</div>
                    <div class="g2" id="top-videos-wrap"></div>
                </div>
            </div>
        </div>
    </div>

<script>
const API = "http://127.0.0.1:8000";
const KOL1 = "豪豪", KOL2 = "千千";
const C1 = "rgba(245,158,11,", C2 = "rgba(6,182,212,";
const charts = {};
const loaded = { growth:false, sentiment:false, audience:false };

// ==================== Chart.js Defaults ====================
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = 'rgba(148,163,184,0.06)';
Chart.defaults.font.family = "'Inter','Noto Sans TC',sans-serif";
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.padding = 16;
Chart.defaults.elements.line.tension = 0.4;
Chart.defaults.elements.line.borderWidth = 2.5;
Chart.defaults.elements.point.radius = 2;
Chart.defaults.elements.point.hoverRadius = 5;

// ==================== Tab System ====================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'growth' && !loaded.growth) loadGrowth();
        if (tab === 'sentiment' && !loaded.sentiment) loadSentiment();
        if (tab === 'audience' && !loaded.audience) loadAudience();
    });
});

// ==================== Helpers ====================
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toString();
const pct = n => (n*100).toFixed(1) + '%';

function makeGradient(ctx, r, g, b, h) {
    const gr = ctx.createLinearGradient(0, 0, 0, h || 300);
    gr.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    gr.addColorStop(1, `rgba(${r},${g},${b},0.01)`);
    return gr;
}

function statCard(label, val, sub, cls) {
    return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-val ${cls||''}">${val}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}

// ==================== Tab 1: Predict ====================
window.onload = loadRanking;

async function loadRanking() {
    try {
        const r = await axios.get(API + '/api/features/ranking');
        const el = document.getElementById('rank-list');
        el.innerHTML = r.data.top_features.map((it, i) =>
            `<div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-word"># ${it.keyword}</span><span class="rank-score">${(it.score*100).toFixed(1)}%</span></div>`
        ).join('');
        document.getElementById('rank-err').classList.remove('show');
        document.getElementById('model-badge').textContent = '⚡ API 已連線';
    } catch(e) {
        document.getElementById('rank-list').innerHTML = '';
        document.getElementById('rank-err').classList.add('show');
        document.getElementById('model-badge').textContent = '❌ API 離線';
    }
}

async function doPredict() {
    const btn = document.getElementById('btn-predict');
    const title = document.getElementById('inp-title').value;
    if (!title) { alert('請輸入標題'); return; }
    btn.disabled = true; btn.textContent = '計算中...';
    try {
        const r = await axios.post(API + '/predict', {
            title, kol_name: document.getElementById('inp-kol').value,
            strategic_tag: document.getElementById('inp-tag').value
        });
        const d = r.data;
        const box = document.getElementById('result-box');
        box.classList.add('show');
        document.getElementById('r-views').textContent = d.prediction.toLocaleString();
        document.getElementById('r-info').textContent = `基數: ${fmt(d.base_value)} · 命中 ${d.keyword_hit_count} 個關鍵字 · ${d.model_version}`;
        document.getElementById('r-tags').innerHTML = d.matched.map(t => `<span class="tag">#${t}</span>`).join('');
        const s = d.sentiment_score;
        const sEl = document.getElementById('r-sentiment');
        sEl.textContent = (s*100).toFixed(0) + '分';
        sEl.style.color = s > 0.6 ? 'var(--success)' : s < 0.4 ? 'var(--danger)' : 'var(--kol1)';
    } catch(e) { alert('預測失敗，請確認 API 運作正常'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-bolt"></i>&nbsp; 開始 AI 流量預測'; }
}

// ==================== Tab 2: Growth ====================
async function loadGrowth() {
    try {
        const r = await axios.get(API + '/api/growth-stats');
        if (r.data.status !== 'success') throw new Error(r.data.message);
        const d = r.data.data;
        const months = r.data.months;
        const k1 = d[KOL1], k2 = d[KOL2];

        // Stats cards
        document.getElementById('growth-stats').innerHTML =
            statCard('豪豪 總影片', k1.total_videos, `月均 ${k1.avg_monthly_uploads} 部`, 'kol1') +
            statCard('千千 總影片', k2.total_videos, `月均 ${k2.avg_monthly_uploads} 部`, 'kol2') +
            statCard('豪豪 平均觀看', fmt(k1.avg_views), `中位數 ${fmt(k1.median_views)}`, 'kol1') +
            statCard('千千 平均觀看', fmt(k2.avg_views), `中位數 ${fmt(k2.median_views)}`, 'kol2');

        // Monthly uploads chart
        const labels = months.slice(-24);
        const u1 = k1.monthly.filter(m => labels.includes(m.month)).map(m => m.uploads);
        const u2 = k2.monthly.filter(m => labels.includes(m.month)).map(m => m.uploads);
        const v1 = k1.monthly.filter(m => labels.includes(m.month)).map(m => m.avg_views);
        const v2 = k2.monthly.filter(m => labels.includes(m.month)).map(m => m.avg_views);
        const g1 = k1.monthly.filter(m => labels.includes(m.month)).map(m => m.growth_rate * 100);
        const g2r = k2.monthly.filter(m => labels.includes(m.month)).map(m => m.growth_rate * 100);
        const shortLabels = labels.map(m => m.slice(2));

        const ctx1 = document.getElementById('chart-uploads').getContext('2d');
        charts.uploads = new Chart(ctx1, {
            type: 'line', data: {
                labels: shortLabels,
                datasets: [
                    { label: KOL1, data: u1, borderColor: C1+'1)', backgroundColor: makeGradient(ctx1,245,158,11), fill: true },
                    { label: KOL2, data: u2, borderColor: C2+'1)', backgroundColor: makeGradient(ctx1,6,182,212), fill: true }
                ]
            }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top'}}, scales:{y:{beginAtZero:true}} }
        });

        const ctx2 = document.getElementById('chart-avgviews').getContext('2d');
        charts.avgviews = new Chart(ctx2, {
            type: 'line', data: {
                labels: shortLabels,
                datasets: [
                    { label: KOL1, data: v1, borderColor: C1+'1)', backgroundColor: makeGradient(ctx2,245,158,11), fill: true },
                    { label: KOL2, data: v2, borderColor: C2+'1)', backgroundColor: makeGradient(ctx2,6,182,212), fill: true }
                ]
            }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top'}}, scales:{y:{ticks:{callback:v=>fmt(v)}}} }
        });

        const ctx3 = document.getElementById('chart-growth').getContext('2d');
        charts.growth = new Chart(ctx3, {
            type: 'bar', data: {
                labels: shortLabels,
                datasets: [
                    { label: KOL1, data: g1, backgroundColor: C1+'0.7)', borderColor: C1+'1)', borderWidth:1, borderRadius:4 },
                    { label: KOL2, data: g2r, backgroundColor: C2+'0.7)', borderColor: C2+'1)', borderWidth:1, borderRadius:4 }
                ]
            }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top'}}, scales:{y:{ticks:{callback:v=>v.toFixed(0)+'%'}}} }
        });

        // Tag compare table
        const tags = ['Long','Mid','Shorts'];
        const tagNames = {'Long':'長影片','Mid':'中等','Shorts':'短影音'};
        let tagHtml = '';
        tags.forEach(t => {
            const t1 = k1.by_tag[t] || {count:0,avg_views:0};
            const t2 = k2.by_tag[t] || {count:0,avg_views:0};
            tagHtml += `<div class="cmp-row"><div class="cmp-label">${tagNames[t]}</div><div class="cmp-vals">
                <div class="cmp-v"><div class="v" style="color:var(--kol1)">${t1.count}部 · ${fmt(t1.avg_views)}次</div><div class="l">豪豪</div></div>
                <div class="cmp-v"><div class="v" style="color:var(--kol2)">${t2.count}部 · ${fmt(t2.avg_views)}次</div><div class="l">千千</div></div>
            </div></div>`;
        });
        document.getElementById('tag-compare').innerHTML = tagHtml;

        document.getElementById('growth-loading').style.display = 'none';
        document.getElementById('growth-content').style.display = 'block';
        loaded.growth = true;
    } catch(e) {
        document.getElementById('growth-loading').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:var(--danger);animation:none"></i><br>載入失敗: ${e.message}`;
    }
}

// ==================== Tab 3: Sentiment ====================
async function loadSentiment() {
    try {
        const r = await axios.get(API + '/api/sentiment');
        if (r.data.status !== 'success') throw new Error(r.data.message);
        const d = r.data.data;
        const k1 = d[KOL1], k2 = d[KOL2];

        // Stats
        document.getElementById('sent-stats').innerHTML =
            statCard('豪豪 平均情緒', (k1.avg_sentiment*100).toFixed(0)+'分', sentLabel(k1.avg_sentiment), 'kol1') +
            statCard('千千 平均情緒', (k2.avg_sentiment*100).toFixed(0)+'分', sentLabel(k2.avg_sentiment), 'kol2') +
            statCard('豪豪 正面標題', k1.distribution.positive+'部', `負面 ${k1.distribution.negative}部`) +
            statCard('千千 正面標題', k2.distribution.positive+'部', `負面 ${k2.distribution.negative}部`);

        // Doughnut charts
        const sentColors = ['#10b981','#f59e0b','#ef4444'];
        const sentLabelsArr = ['正面','中性','負面'];
        [['chart-sent1',k1],['chart-sent2',k2]].forEach(([id,kd]) => {
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type:'doughnut', data: {
                    labels: sentLabelsArr,
                    datasets:[{data:[kd.distribution.positive,kd.distribution.neutral,kd.distribution.negative],
                        backgroundColor:sentColors, borderWidth:0, hoverOffset:8}]
                }, options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
                    plugins:{legend:{position:'bottom'}}}
            });
        });

        // Scatter chart
        const ctx = document.getElementById('chart-scatter').getContext('2d');
        charts.scatter = new Chart(ctx, {
            type:'scatter', data:{
                datasets:[
                    {label:KOL1, data:k1.scatter.map(s=>({x:s.x,y:s.y})), backgroundColor:C1+'0.5)', borderColor:C1+'1)', pointRadius:4},
                    {label:KOL2, data:k2.scatter.map(s=>({x:s.x,y:s.y})), backgroundColor:C2+'0.5)', borderColor:C2+'1)', pointRadius:4}
                ]
            }, options:{responsive:true,maintainAspectRatio:false,
                scales:{x:{title:{display:true,text:'情緒分數 (0=負面, 1=正面)'}},y:{title:{display:true,text:'觀看數'},ticks:{callback:v=>fmt(v)}}},
                plugins:{legend:{position:'top'},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toLocaleString()} 次`}}}}
        });

        // Tables
        function sentTable(elId, items) {
            const el = document.getElementById(elId);
            el.innerHTML = `<thead><tr><th>KOL</th><th>標題</th><th>情緒</th><th>觀看數</th></tr></thead><tbody>` +
                items.map(it => `<tr><td>${it.kol}</td><td class="truncate">${it.title}</td><td><span class="tag ${it.sentiment>0.6?'pos':'neg'}">${(it.sentiment*100).toFixed(0)}分</span></td><td>${fmt(it.views)}</td></tr>`).join('') +
                `</tbody>`;
        }
        const allPos = [...k1.top_positive.map(t=>({...t,kol:KOL1})),...k2.top_positive.map(t=>({...t,kol:KOL2}))].sort((a,b)=>b.sentiment-a.sentiment).slice(0,5);
        const allNeg = [...k1.top_negative.map(t=>({...t,kol:KOL1})),...k2.top_negative.map(t=>({...t,kol:KOL2}))].sort((a,b)=>a.sentiment-b.sentiment).slice(0,5);
        sentTable('tbl-positive', allPos);
        sentTable('tbl-negative', allNeg);

        document.getElementById('sent-loading').style.display = 'none';
        document.getElementById('sent-content').style.display = 'block';
        loaded.sentiment = true;
    } catch(e) {
        document.getElementById('sent-loading').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:var(--danger);animation:none"></i><br>載入失敗: ${e.message}`;
    }
}

function sentLabel(v) { return v > 0.6 ? '偏正面 😊' : v < 0.4 ? '偏負面 😟' : '中性 😐'; }

// ==================== Tab 4: Audience ====================
async function loadAudience() {
    try {
        const r = await axios.get(API + '/api/audience-comparison');
        if (r.data.status !== 'success') throw new Error(r.data.message);
        const d = r.data.data;
        const k1 = d[KOL1], k2 = d[KOL2];

        // Stats
        document.getElementById('aud-stats').innerHTML =
            statCard('豪豪 互動率', k1.overall_engagement.toFixed(2)+'%', `按讚率 ${k1.overall_like_rate.toFixed(2)}%`, 'kol1') +
            statCard('千千 互動率', k2.overall_engagement.toFixed(2)+'%', `按讚率 ${k2.overall_like_rate.toFixed(2)}%`, 'kol2') +
            statCard('豪豪 留言率', k1.overall_comment_rate.toFixed(3)+'%', `${k1.total_videos} 部影片`) +
            statCard('千千 留言率', k2.overall_comment_rate.toFixed(3)+'%', `${k2.total_videos} 部影片`);

        // Radar chart
        const radarLabels = ['長影片互動','中等互動','短影音互動','長影片觀看(萬)','中等觀看(萬)','短影音觀看(萬)'];
        const r1 = [k1.by_type.Long.engagement_rate, k1.by_type.Mid.engagement_rate, k1.by_type.Shorts.engagement_rate,
                     k1.by_type.Long.avg_views/10000, k1.by_type.Mid.avg_views/10000, k1.by_type.Shorts.avg_views/10000];
        const r2 = [k2.by_type.Long.engagement_rate, k2.by_type.Mid.engagement_rate, k2.by_type.Shorts.engagement_rate,
                     k2.by_type.Long.avg_views/10000, k2.by_type.Mid.avg_views/10000, k2.by_type.Shorts.avg_views/10000];
        const ctxR = document.getElementById('chart-radar').getContext('2d');
        charts.radar = new Chart(ctxR, {
            type:'radar', data:{
                labels:radarLabels,
                datasets:[
                    {label:KOL1, data:r1, borderColor:C1+'1)', backgroundColor:C1+'0.15)', pointBackgroundColor:C1+'1)'},
                    {label:KOL2, data:r2, borderColor:C2+'1)', backgroundColor:C2+'0.15)', pointBackgroundColor:C2+'1)'}
                ]
            }, options:{responsive:true,maintainAspectRatio:false,scales:{r:{grid:{color:'rgba(148,163,184,0.08)'},pointLabels:{font:{size:10}},ticks:{display:false}}}}
        });

        // Type distribution bar
        const ctxT = document.getElementById('chart-typedist').getContext('2d');
        charts.typedist = new Chart(ctxT, {
            type:'bar', data:{
                labels:['長影片','中等','短影音'],
                datasets:[
                    {label:KOL1, data:[k1.by_type.Long.count,k1.by_type.Mid.count,k1.by_type.Shorts.count], backgroundColor:C1+'0.7)', borderRadius:6},
                    {label:KOL2, data:[k2.by_type.Long.count,k2.by_type.Mid.count,k2.by_type.Shorts.count], backgroundColor:C2+'0.7)', borderRadius:6}
                ]
            }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}}}
        });

        // Keywords
        function kwList(elId, keywords) {
            document.getElementById(elId).innerHTML = keywords.map((k,i) =>
                `<div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-word">${k.word}</span><span class="rank-score">${k.count}次</span></div>`
            ).join('');
        }
        kwList('kw-list-1', k1.top_keywords);
        kwList('kw-list-2', k2.top_keywords);

        // Top videos
        let tvHtml = '';
        [['豪豪',k1,'kol1'],['千千',k2,'kol2']].forEach(([name,kd,cls]) => {
            tvHtml += `<div><div style="font-weight:700;margin-bottom:.6rem"><span class="kol-dot ${cls==='kol1'?'k1':'k2'}"></span> ${name}</div>`;
            kd.top_videos.forEach((v,i) => {
                tvHtml += `<div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-word" style="font-size:.8rem">${v.title}</span><span class="rank-score">${fmt(v.views)}</span></div>`;
            });
            tvHtml += '</div>';
        });
        document.getElementById('top-videos-wrap').innerHTML = tvHtml;

        document.getElementById('aud-loading').style.display = 'none';
        document.getElementById('aud-content').style.display = 'block';
        loaded.audience = true;
    } catch(e) {
        document.getElementById('aud-loading').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:var(--danger);animation:none"></i><br>載入失敗: ${e.message}`;
    }
}
</script>
